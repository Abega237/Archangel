      <stop offset="30%" stop-color="#b0b8c8"/>
      <stop offset="60%" stop-color="#8090a8"/>
      <stop offset="100%" stop-color="#5a6678"/>
    </linearGradient>
    <linearGradient id="clipShine" x1="0%" y1="0%" x2="100%" y2="0%">
