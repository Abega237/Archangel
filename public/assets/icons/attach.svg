  <path d="M32 9 C39 9 42 14 42 20 L42 34 C42 40 37 44 31 44 L19 44 C15 44 12 41 12 38 L12 14 C12 9 16 6 20 6 C24 6 27 9 27 13 L27 35 C27 37 25.5 38.5 24 38.5 C22.5 38.5 21 37 21 35 L21 14"
