<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="blockBg" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="50%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </radialGradient>
    <radialGradient id="blockShine" cx="35%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blockShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#7f1d1d" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Ombre extrusion -->
  <circle cx="25" cy="27" r="19" fill="#7f1d1d" opacity="0.4"/>
  <!-- Fond cercle rouge profond -->
  <circle cx="24" cy="24" r="19" fill="url(#blockBg)" filter="url(#blockShadow)"/>
  <!-- Reflet verre -->
  <circle cx="24" cy="24" r="19" fill="url(#blockShine)"/>
  <!-- Anneau extérieur blanc (insigne) -->
  <circle cx="24" cy="24" r="13" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
  <!-- Barre diagonale prononcée -->
  <line x1="13" y1="35" x2="35" y2="13" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.95"/>
  <!-- Reflet bord sup du cercle -->
  <path d="M14 18 A13 13 0 0 1 34 18" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
