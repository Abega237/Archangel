<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="logoutBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4757"/>
      <stop offset="50%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#7f0000"/>
    </linearGradient>
    <linearGradient id="logoutShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="logoutShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#7f0000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Ombre portée (extrusion) -->
  <rect x="8" y="11" width="18" height="28" rx="5" fill="#5a0000" opacity="0.5"/>
  <!-- Corps principal -->
  <rect x="6" y="8" width="18" height="28" rx="5" fill="url(#logoutBg)" filter="url(#logoutShadow)"/>
  <!-- Reflet brillant -->
  <rect x="7" y="9" width="10" height="12" rx="3" fill="url(#logoutShine)"/>
  <!-- Flèche de sortie extrusion (ombre) -->
  <path d="M24 26 L36 24 L30 19" stroke="#7f0000" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" transform="translate(1,2)"/>
  <!-- Flèche de sortie principale -->
  <path d="M24 26 L36 24 L30 19" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M30 29 L36 24 L30 19" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Encoche de la porte -->
  <path d="M18 19 L18 15 L10 15 M10 33 L18 33 L18 29" stroke="rgba(255,255,255,0.7)" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>
