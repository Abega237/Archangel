<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="bubbleBody" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#2e1a87"/>
    </radialGradient>
    <radialGradient id="bubbleInner" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="bubbleShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#1e1060" flood-opacity="0.55"/>
    </filter>
  </defs>
  <!-- Ombre extrusion -->
  <path d="M40 8 C43 8 45 10 45 13 L45 30 C45 33 43 35 40 35 L26 35 L20 42 L20 35 L10 35 C7 35 5 33 5 30 L5 13 C5 10 7 8 10 8 Z" fill="#1e1060" opacity="0.35" transform="translate(1,3)"/>
  <!-- Corps de la bulle -->
  <path d="M40 8 C43 8 45 10 45 13 L45 30 C45 33 43 35 40 35 L26 35 L20 42 L20 35 L10 35 C7 35 5 33 5 30 L5 13 C5 10 7 8 10 8 Z" fill="url(#bubbleBody)" filter="url(#bubbleShadow)"/>
  <!-- Reflet verre -->
  <path d="M40 8 C43 8 45 10 45 13 L45 30 C45 33 43 35 40 35 L26 35 L20 42 L20 35 L10 35 C7 35 5 33 5 30 L5 13 C5 10 7 8 10 8 Z" fill="url(#bubbleInner)"/>
  <!-- Horloge intégrée dans la bulle -->
  <circle cx="25" cy="22" r="9" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <line x1="25" y1="22" x2="25" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="25" y1="22" x2="30" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="25" cy="22" r="1.5" fill="white"/>
</svg>
