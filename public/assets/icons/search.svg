<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <radialGradient id="lensGrad" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#bfdbfe"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="searchShadow">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#1e3a8a" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Ombre -->
  <circle cx="21" cy="22" r="13" fill="#1e3a8a" opacity="0.25" transform="translate(1,3)"/>
  <!-- Anneau loupe -->
  <circle cx="20" cy="20" r="13" fill="none" stroke="#475569" stroke-width="4" filter="url(#searchShadow)"/>
  <!-- Verre de la loupe -->
  <circle cx="20" cy="20" r="11" fill="url(#lensGrad)" opacity="0.8"/>
  <!-- Reflet verre -->
  <path d="M12 14 A10 10 0 0 1 28 14" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Manche -->
  <line x1="30" y1="30" x2="42" y2="42" stroke="url(#handleGrad)" stroke-width="5" stroke-linecap="round"/>
  <line x1="31" y1="30" x2="38" y2="37" stroke="rgba(255,255,255,0.3)" stroke-width="2" stroke-linecap="round"/>
</svg>
